<!-- ========== Header: Banner Carousel ========== -->
<div id="headerCarousel" class="carousel slide" data-bs-ride="carousel" data-bs-interval="4000">
  <!-- Indicators -->
  <div class="carousel-indicators">
    <button type="button" data-bs-target="#headerCarousel" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
    <button type="button" data-bs-target="#headerCarousel" data-bs-slide-to="1" aria-label="Slide 2"></button>
    <button type="button" data-bs-target="#headerCarousel" data-bs-slide-to="2" aria-label="Slide 3"></button>
  </div>

  <!-- Slides -->
  <div class="carousel-inner">
    <!-- Slide 1 -->
    <div class="carousel-item active">
      <img src="https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=1200&h=400&fit=crop" class="d-block w-100" alt="Technology">
      <div class="carousel-caption d-none d-md-block">
        <h5>Selamat Datang</h5>
        <p>Website Portofolio Rizqi - STT Terpadu Nurul Fikri</p>
      </div>
    </div>
    <!-- Slide 2 -->
    <div class="carousel-item">
      <img src="https://images.unsplash.com/photo-1523050854058-8df90110c476?w=1200&h=400&fit=crop" class="d-block w-100" alt="Campus">
      <div class="carousel-caption d-none d-md-block">
        <h5>STT Terpadu Nurul Fikri</h5>
        <p>Kampus IT Terdepan di Jakarta</p>
      </div>
    </div>
    <!-- Slide 3 -->
    <div class="carousel-item">
      <img src="https://images.unsplash.com/photo-1504384308090-c894fdcc538d?w=1200&h=400&fit=crop" class="d-block w-100" alt="Coding">
      <div class="carousel-caption d-none d-md-block">
        <h5>Desain Web Responsif</h5>
        <p>Tugas Pertemuan 6 - Responsive Web Design</p>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <button class="carousel-control-prev" type="button" data-bs-target="#headerCarousel" data-bs-slide="prev">
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Previous</span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#headerCarousel" data-bs-slide="next">
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Next</span>
  </button>
</div>
