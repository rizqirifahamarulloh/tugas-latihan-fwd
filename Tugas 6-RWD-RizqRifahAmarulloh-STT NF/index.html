<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Website Portofolio Rizqi Rifah Amarulloh - STT Terpadu Nurul Fikri">
  <meta name="author" content="Rizqi Rifah Amarulloh">
  <title>Rizqi Rifah Amarulloh - STT Terpadu Nurul Fikri</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <!-- Custom CSS -->
  <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>

  <!-- ============================== -->
  <!-- HEADER: Banner Carousel        -->
  <!-- ============================== -->
  <header id="headerArea">
    <!-- Loaded from components/header.html -->
    <div class="text-center py-5 text-muted"><div class="spinner-border" role="status"></div></div>
  </header>

  <!-- ============================== -->
  <!-- NAVBAR: Navigation Menu        -->
  <!-- ============================== -->
  <div id="navbarArea">
    <!-- Loaded from components/navbar.html -->
  </div>

  <!-- ============================== -->
  <!-- MAIN LAYOUT: Sidebar + Content -->
  <!-- ============================== -->
  <div class="container-fluid py-4">
    <div class="row g-4">

      <!-- Sidebar (Left) - 3 columns on large screens -->
      <div class="col-lg-3 col-md-4 order-md-1" id="sidebarArea">

        <div class="text-center py-4 text-muted"><div class="spinner-border spinner-border-sm" role="status"></div></div>
      </div>

      <!-- Main Content (Right) - 9 columns on large screens -->
      <div class="col-lg-9 col-md-8 order-md-2">
        <div id="mainContent">
          <!-- Dynamic content loaded from pages/ folder -->
          <div class="text-center py-5 text-muted">
            <div class="spinner-border" role="status"></div>
            <p class="mt-2">Memuat halaman...</p>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- ============================== -->
  <!-- FOOTER                         -->
  <!-- ============================== -->
  <div id="footerArea">
    <!-- Loaded from components/footer.html -->
  </div>

  <!-- Bootstrap 5 JS Bundle (includes Popper) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Main Application Script -->
  <script src="assets/js/main.js"></script>

</html>
